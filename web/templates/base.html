<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kommo Scrapper{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f1923; color: #e0e0e0; }
        .navbar { background: #1a2733 !important; border-bottom: 1px solid #2d3e50; }
        .card { background: #1a2733; border: 1px solid #2d3e50; }
        .card-header { background: #243447; border-bottom: 1px solid #2d3e50; }
        .table { color: #e0e0e0; }
        .table-dark { --bs-table-bg: #1a2733; --bs-table-border-color: #2d3e50; }
        .badge-bot { background: #6f42c1; }
        .badge-human { background: #198754; }
        .badge-contact { background: #0d6efd; }
        .badge-attended { background: #198754; }
        .badge-pending { background: #ffc107; color: #000; }
        .badge-bot-only { background: #6f42c1; }
        .badge-outbound { background: #6c757d; }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-number { font-size: 2.5rem; font-weight: bold; }
        .stat-label { font-size: 0.85rem; opacity: 0.7; }
        .msg-in { background: #2d3e50; border-radius: 12px 12px 12px 0; padding: 8px 14px; margin: 4px 0; max-width: 75%; }
        .msg-out { background: #1a4971; border-radius: 12px 12px 0 12px; padding: 8px 14px; margin: 4px 0; max-width: 75%; margin-left: auto; }
        .msg-bot { border-left: 3px solid #6f42c1; }
        .msg-time { font-size: 0.75rem; opacity: 0.5; }
        .msg-author { font-size: 0.8rem; font-weight: bold; color: #4fc3f7; }
        a { color: #4fc3f7; }
        .flash-msg { position: fixed; top: 70px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-chat-dots-fill"></i> Kommo Scrapper</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="/chats"><i class="bi bi-chat-left-text"></i> Chats</a>
                <a class="nav-link" href="/no-reply"><i class="bi bi-exclamation-triangle"></i> Sin Respuesta</a>
                <a class="nav-link" href="/stages"><i class="bi bi-arrow-left-right"></i> Etapas</a>
                <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Config</a>
            </div>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-msg">
        {% for cat, msg in messages %}
        <div class="alert alert-{{ 'success' if cat == 'success' else 'danger' }} alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
